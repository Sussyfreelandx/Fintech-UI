<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Oakmont Digital Markets Group logo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1f2d"/>
      <stop offset="100%" stop-color="#03121f"/>
    </linearGradient>
    <clipPath id="clip">
      <rect width="64" height="64" rx="14"/>
    </clipPath>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- O circle ring representing Oakmont -->
  <circle cx="32" cy="32" r="17" fill="none" stroke="#475569" stroke-width="2.5"/>
  <!-- Rising trend line (market performance indicator) -->
  <polyline points="19,41 26,30 32,35 45,21" fill="none" stroke="#10b981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" clip-path="url(#clip)"/>
  <!-- Accent terminal dot -->
  <circle cx="45" cy="21" r="2.5" fill="#10b981"/>
</svg>
